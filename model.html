<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: transparent; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
var scene = new THREE.Scene();
var w = window.innerWidth, h = window.innerHeight;
var camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 1000);
var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(w, h);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));

var d1 = new THREE.DirectionalLight(0xffffff, 0.3);
d1.position.set(5, 10, 7);
d1.castShadow = true;
d1.shadow.radius = 3;
d1.shadow.mapSize.width = 1024;
d1.shadow.mapSize.height = 1024;
scene.add(d1);

scene.add(new THREE.DirectionalLight(0xffffff, 0.2)).position.set(-5, 5, -5);

var pivot = new THREE.Group();
scene.add(pivot);

var loader = new THREE.GLTFLoader();
loader.load('https://adihimi.github.io/Portfolio/agan-ayalon.glb', function(gltf){
  var model = gltf.scene;
  var mat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.0 });
  model.traverse(function(child){
    if(child.isMesh){
      child.material = mat;
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  var box = new THREE.Box3().setFromObject(model);
  var center = box.getCenter(new THREE.Vector3());
  var size = box.getSize(new THREE.Vector3()).length();
  model.position.set(-center.x, -center.y, -center.z);
  pivot.add(model);
  camera.position.set(0, size*0.2, size*1.5);
  camera.lookAt(0, 0, 0);
});

function animate(){
  requestAnimationFrame(animate);
  pivot.rotation.y += 0.002;
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
