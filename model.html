<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // תאורה חזקה להוצאת הצללים
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const loader = new THREE.GLTFLoader();
        let model;

        // וודאי שהכתובת כאן היא בדיוק השם של הקובץ שהעלית לגיטהאב!
        loader.load('agan-ayalon.glb', function(gltf) {
            model = gltf.scene;
            
            // מירכוז המודל
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            // התאמת המצלמה לגודל המודל
            const size = box.getSize(new THREE.Vector3()).length();
            camera.position.set(0, size * 0.2, size * 1.5);
            camera.lookAt(0, 0, 0);

            // צבע לבן מט
            model.traverse((node) => {
                if (node.isMesh) {
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.5
                    });
                }
            });

            scene.add(model);
        }, undefined, function(error) {
            console.error('Error loading model:', error);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (model) model.rotation.y += 0.005; // המהירות של הסיבוב
            renderer.render(scene, camera);
        }
        animate();

        // התאמה לשינוי גודל חלון
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
