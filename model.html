<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; background: transparent; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
var scene = new THREE.Scene();
var w = window.innerWidth, h = window.innerHeight;
var camera = new THREE.PerspectiveCamera(35, w/h, 0.1, 1000);
var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(w, h);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

var hemi = new THREE.HemisphereLight(0xffffff, 0xaaaaaa, 1.5);
scene.add(hemi);
var dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(3, 8, 5);
dir.castShadow = true;
dir.shadow.radius = 12;
dir.shadow.mapSize.width = 2048;
dir.shadow.mapSize.height = 2048;
scene.add(dir);

var pivot = new THREE.Group();
scene.add(pivot);

var loader = new THREE.GLTFLoader();
loader.load('https://raw.githubusercontent.com/Adihimi/Portfolio/main/agan-ayalon.glb', function(gltf){
  var model = gltf.scene;
  var mat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.6, metalness: 0.0 });
  model.traverse(function(child){
    if(child.isMesh){
      child.material = mat;
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  var box = new THREE.Box3().setFromObject(model);
  var center = box.getCenter(new THREE.Vector3());
  var size = box.getSize(new THREE.Vector3()).length();
  model.position.set(-center.x, -center.y, -center.z);
  pivot.add(model);
  camera.position.set(0, size*0.25, size*1.6);
  camera.lookAt(0, 0, 0);
});

function animate(){
  requestAnimationFrame(animate);
  pivot.rotation.y += 0.002;
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
