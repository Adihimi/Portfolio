<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // אופטימיזציית ביצועים
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // צללים רכים
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.castShadow = true;
        scene.add(light);

        // הגדרות איכות הצל - נגדיל ל-4096 לדיוק מקסימלי
        light.shadow.mapSize.width = 4096;
        light.shadow.mapSize.height = 4096;
        
        // תיקון ריצוד (Shadow Acne) - normalBias עדין ו-bias שלילי קטן
        light.shadow.normalBias = 0.02; 
        light.shadow.bias = -0.0001; 

        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        const loader = new THREE.GLTFLoader();
        loader.load('./agan-ayalon.glb', function(gltf) {
            const model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            model.position.set(-center.x, -box.min.y, -center.z);

            // הגדרת מצלמת הצל לפי הרדיוס המקסימלי כדי למנוע חיתוכים ריבועיים
            // המשתנה d יגדיל את טווח הצל בצורה דרמטית
            const d = Math.max(size.x, size.y, size.z) * 1.5;
            light.position.set(d, d * 2, d);
            light.shadow.camera.left = -d;
            light.shadow.camera.right = d;
            light.shadow.camera.top = d;
            light.shadow.camera.bottom = -d;
            light.shadow.camera.near = 0.1;
            light.shadow.camera.far = d * 6;
            light.shadow.camera.updateProjectionMatrix();

            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.9 // מט מוחלט מונע החזרי אור מבריקים
                    });
                }
            });

            modelGroup.add(model);

            // רצפה קבועה - יורדת מעט יותר כדי למנוע Z-fighting אגרסיבי
            // הרצפה חייבת להיות גדולה מאוד כדי שהצל לא ייחתך גם במרחק
            const planeGeo = new THREE.PlaneGeometry(d * 20, d * 20);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.2 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.15; // מרווח אגרסיבי למניעת Z-fighting
            plane.receiveShadow = true;
            scene.add(plane);

            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(maxDim * 1.8, maxDim, maxDim * 1.8);
            camera.lookAt(0, maxDim * 0.2, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (modelGroup) {
                modelGroup.rotation.y += 0.005;
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
