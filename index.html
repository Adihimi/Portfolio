<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // הפעלת צללים ב-Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // צללים רכים ואיכותיים
        document.body.appendChild(renderer.domElement);

        // תאורה שתייצר צל (Directional Light)
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 12, 8);
        light.castShadow = true; // פקודה קריטית!
        
        // הגדרות איכות הצל
        light.shadow.mapSize.width = 2048;
        light.shadow.mapSize.height = 2048;
        light.shadow.camera.near = 0.5;
        light.shadow.camera.far = 50;
        scene.add(light);

        // תאורה משלימה כדי שהצד החשוך לא יהיה שחור לגמרי
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // הוספת "רצפה" שקופה שקולטת רק צל
        const planeGeometry = new THREE.PlaneGeometry(100, 100);
        const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.3 }); // קולט צל בלבד
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.5; // מעט מתחת למודל
        plane.receiveShadow = true;
        scene.add(plane);

        const loader = new THREE.GLTFLoader();
        let model;

        loader.load('./agan-ayalon.glb', function(gltf) {
            model = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;    // המודל מטיל צל
                    node.receiveShadow = true; // המודל מקבל צל של עצמו (עומק)
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.7
                    });
                }
            });
            
            scene.add(model);
            const size = box.getSize(new THREE.Vector3()).length();
            camera.position.set(size, size * 0.8, size);
            camera.lookAt(0, 0, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (model) model.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
