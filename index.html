<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // צללים רכים ואיכותיים
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(20, 40, 20); // העליתי את האור למעלה כדי שהצללים יהיו יציבים
        light.castShadow = true;
        
        // הגדרה רחבה של מצלמת הצל למניעת עיוותים בסיבוב
        light.shadow.camera.left = -100;
        light.shadow.camera.right = 100;
        light.shadow.camera.top = 100;
        light.shadow.camera.bottom = -100;
        light.shadow.mapSize.width = 2048;
        light.shadow.mapSize.height = 2048;
        light.shadow.bias = -0.0001; 
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        let modelGroup = new THREE.Group(); 
        scene.add(modelGroup);

        loader.load('./agan-ayalon.glb', function(gltf) {
            const loadedModel = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            // הצמדה ל-0 פעם אחת בטעינה
            loadedModel.position.set(-center.x, -box.min.y, -center.z);

            loadedModel.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.8
                    });
                }
            });

            modelGroup.add(loadedModel);

            // רצפה קבועה במיקום אפס
            const planeGeo = new THREE.PlaneGeometry(500, 500);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.25 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.05; // קיבוע מתחת למודל
            plane.receiveShadow = true;
            scene.add(plane);

            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(maxDim * 1.5, maxDim * 0.8, maxDim * 1.5);
            camera.lookAt(0, maxDim * 0.2, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (modelGroup) {
                modelGroup.rotation.y += 0.005; 
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
