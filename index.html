<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        
        // הגדרות צל רחבות כדי שלא ייחתך בסיבוב
        light.shadow.mapSize.width = 2048;
        light.shadow.mapSize.height = 2048;
        light.shadow.camera.left = -50;
        light.shadow.camera.right = 50;
        light.shadow.camera.top = 50;
        light.shadow.camera.bottom = -50;
        light.shadow.bias = -0.0005; 
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        let modelGroup = new THREE.Group(); // קבוצה שתחזיק את המודל ותסובב אותו
        scene.add(modelGroup);

        loader.load('./agan-ayalon.glb', function(gltf) {
            const loadedModel = gltf.scene;
            
            // חישוב המרכז והתחתית פעם אחת בלבד בטעינה
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            // ממרכזים את המודל בתוך הקבוצה שלו
            loadedModel.position.x = -center.x;
            loadedModel.position.z = -center.z;
            loadedModel.position.y = -box.min.y; 

            loadedModel.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.8
                    });
                }
            });

            modelGroup.add(loadedModel);

            // יצירת רצפה קבועה ב-0
            const planeGeo = new THREE.PlaneGeometry(200, 200);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.2 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.01; 
            plane.receiveShadow = true;
            scene.add(plane);

            // התאמת המצלמה
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(maxDim * 1.5, maxDim, maxDim * 1.5);
            camera.lookAt(0, maxDim * 0.2, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (modelGroup) {
                modelGroup.rotation.y += 0.005; // מסובבים את הקבוצה הממורכזת
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
