<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.castShadow = true;
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        let model, plane;

        loader.load('./agan-ayalon.glb', function(gltf) {
            model = gltf.scene;
            
            // חישוב גודל ומיקום פעם אחת בלבד
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3()).length();
            const center = box.getCenter(new THREE.Vector3());
            const bottomY = box.min.y;

            // ממרכזים את המודל ונועלים אותו
            model.position.x = -center.x;
            model.position.z = -center.z;
            model.position.y = -bottomY; // מעלה את התחתית ל-0

            // הגדרות תאורה מותאמות לגודל
            light.position.set(size, size * 2, size);
            light.shadow.camera.left = -size;
            light.shadow.camera.right = size;
            light.shadow.camera.top = size;
            light.shadow.camera.bottom = -size;
            light.shadow.mapSize.width = 2048;
            light.shadow.mapSize.height = 2048;
            light.shadow.bias = -0.001; // מונע ריצוד על המודל הלבן

            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.8
                    });
                }
            });
            scene.add(model);

            // יצירת רצפה במיקום קבוע ב-0 (שזה עכשיו בסיס המודל)
            const planeGeo = new THREE.PlaneGeometry(size * 10, size * 10);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.2 });
            plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.01; // ממש טיפה מתחת ל-0 כדי למנוע התנגשות ויזואלית
            plane.receiveShadow = true;
            scene.add(plane);

            camera.position.set(size, size * 0.7, size);
            camera.lookAt(0, size * 0.2, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (model) {
                model.rotation.y += 0.005; // רק המודל מסתובב, הרצפה נשארת במקום!
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
