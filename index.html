<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        
        // תיקון ה-Bias כדי שהצל לא ייראה "מלוכלך" על המודל הלבן
        light.shadow.bias = -0.0001;
        light.shadow.mapSize.width = 2048;
        light.shadow.mapSize.height = 2048;
        scene.add(light);

        const loader = new THREE.GLTFLoader();
        let model;

        loader.load('./agan-ayalon.glb', function(gltf) {
            model = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3()).length();
            const center = box.getCenter(new THREE.Vector3());
            const minY = box.min.y; // הנקודה הכי נמוכה במודל

            // ממרכזים את המודל אבל שומרים על הגובה המקורי שלו ביחס לרצפה
            model.position.x = -center.x;
            model.position.z = -center.z;
            model.position.y = -minY; 

            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.8
                    });
                }
            });
            scene.add(model);

            // יצירת הרצפה בדיוק ב-0, שזה עכשיו הבסיס של המודל
            const planeGeo = new THREE.PlaneGeometry(size * 10, size * 10);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.2 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = 0; 
            plane.receiveShadow = true;
            scene.add(plane);

            camera.position.set(size, size * 0.7, size);
            camera.lookAt(0, size * 0.2, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (model) model.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
