<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        document.body.appendChild(renderer.domElement);

        // אור סביבתי חזק יותר כדי לרכך את האזורים החשוכים
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(50, 100, 50);
        light.castShadow = true;
        
        // תיקון ריצוד: Bias גבוה יותר מונע מהצל "להתנגש" במודל
        light.shadow.bias = -0.005; 
        light.shadow.mapSize.width = 2048;
        light.shadow.mapSize.height = 2048;
        
        // הגדרת מרחקי צל קבועים שלא תלויים בתנועה
        light.shadow.camera.left = -200;
        light.shadow.camera.right = 200;
        light.shadow.camera.top = 200;
        light.shadow.camera.bottom = -200;
        light.shadow.camera.near = 1;
        light.shadow.camera.far = 500;
        scene.add(light);

        let modelGroup = new THREE.Group();
        scene.add(modelGroup);

        const loader = new THREE.GLTFLoader();
        loader.load('./agan-ayalon.glb', function(gltf) {
            const model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            model.position.set(-center.x, -box.min.y, -center.z);

            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 1.0, // מט מוחלט מונע החזרי אור מרצדים
                        metalness: 0.0
                    });
                }
            });

            modelGroup.add(model);

            // רצפה יציבה - מורחקת טיפה למטה למניעת ריצוד עם בסיס המודל
            const planeGeo = new THREE.PlaneGeometry(2000, 2000);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.2 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.1; 
            plane.receiveShadow = true;
            scene.add(plane);

            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(maxDim * 1.5, maxDim, maxDim * 1.5);
            camera.lookAt(0, 0, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (modelGroup) {
                modelGroup.rotation.y += 0.005; 
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
