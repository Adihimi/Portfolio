<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { margin: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.castShadow = true;
        scene.add(light);

        // הגדרות רזולוציה גבוהה לצל
        light.shadow.mapSize.width = 4096; // הכפלתי לרזולוציה מקסימלית
        light.shadow.mapSize.height = 4096;
        light.shadow.normalBias = 0.08; // מונע ריצוד על המשטחים של המודל

        let modelGroup = new THREE.Group();
        scene.add(modelGroup);

        const loader = new THREE.GLTFLoader();
        loader.load('./agan-ayalon.glb', function(gltf) {
            const model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // רדיוס שיכיל את כל המודל גם כשהוא מסתובב
            const radius = Math.max(size.x, size.z) * 1.2;

            // מיקום המודל בדיוק במרכז ובגובה 0
            model.position.set(-center.x, -box.min.y, -center.z);
            modelGroup.add(model);

            // הגדרת מצלמת הצל לפי הרדיוס - מונע את ה"חיתוך"
            light.position.set(radius, radius * 2, radius);
            light.shadow.camera.left = -radius;
            light.shadow.camera.right = radius;
            light.shadow.camera.top = radius;
            light.shadow.camera.bottom = -radius;
            light.shadow.camera.near = 0.1;
            light.shadow.camera.far = radius * 10;
            light.shadow.camera.updateProjectionMatrix();

            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.9
                    });
                }
            });

            // רצפה קבועה - יורדת מעט מאוד למנוע Z-fighting
            const planeGeo = new THREE.PlaneGeometry(radius * 20, radius * 20);
            const planeMat = new THREE.ShadowMaterial({ opacity: 0.2 });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -0.02; 
            plane.receiveShadow = true;
            scene.add(plane);

            camera.position.set(radius * 1.5, radius, radius * 1.5);
            camera.lookAt(0, size.y * 0.2, 0);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (modelGroup) modelGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
